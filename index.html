<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regina Potomkina</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:white;
    color:black;
}

/* HEADER */
header {
    text-align:center;
    padding:40px 20px;
    font-size:28px;
    letter-spacing:2px;
}
header a {
    text-decoration:none;
    color:black;
}

/* NAV */
nav {
    text-align:center;
    margin-bottom:30px;
}
nav a {
    margin:0 10px;
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* GALLERY GRID */
.gallery {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:15px;
    padding:20px;
}
.gallery img {
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    cursor:pointer;
    transition:0.3s;
}
.gallery img:hover {
    transform:scale(1.05);
}

@media(max-width:900px){
    .gallery{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
    .gallery{grid-template-columns:1fr;}
}

/* LIGHTBOX */
#overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#overlay img {
    max-height:85vh;
    max-width:90vw;
    object-fit:contain;
}

/* FOOTER */
footer {
    text-align:center;
    padding:60px 20px;
    font-size:14px;
}
</style>
</head>

<body>

<header>
    <a href="/">REGINA POTOMKINA</a>
</header>

<nav>
    <a href="/">Gallery</a> | <a href="cv.html">CV</a>
</nav>

<section class="gallery">
    <img src="Bild1.jpg">
    <img src="bild2.jpg">
    <img src="bild3.jpg">
    <img src="bild4.jpg">
    <img src="bild5.jpg">
    <img src="bild6.jpg">
    <img src="bild7.jpg">
    <img src="bild8.png">
    <img src="bild9.jpg">
    <img src="bild10.jpg">
    <img src="bild11.png">
    <img src="bild12.png">
    <img src="bild13.jpg">
    <img src="bild14.jpg">
    <img src="bild15.jpg">
    <img src="bild16.jpg">
</section>

<div id="overlay">
    <img id="overlay-img">
</div>

<script>
const overlay = document.getElementById("overlay");
const overlayImg = document.getElementById("overlay-img");

document.querySelectorAll(".gallery img").forEach(img => {
    img.addEventListener("click", () => {
        overlay.style.display = "flex";
        overlayImg.src = img.src;
        document.body.style.overflow = "hidden";
    });
});

overlay.addEventListener("click", () => {
    overlay.style.display = "none";
    overlayImg.src = "";
    document.body.style.overflow = "auto";
});
</script>

<footer>
Kontakt: <span id="email"></span>
</footer>
<script>
(function(){
const p = ["regina","potomkina","gmx","net"];
const e = p[0] + "." + p[1] + "@" + p[2] + "." + p[3];

document.getElementById("email").innerHTML =
'<a href="mailto:'+e+'">'+e+'</a>';
})();
</script>

</body>
</html>
