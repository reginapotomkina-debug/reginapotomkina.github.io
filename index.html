<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regina Potomkina</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:white;
    color:black;
}
header {
    text-align:center;
    padding:40px 20px;
    font-size:28px;
    letter-spacing:2px;
}
header a {
    text-decoration:none;
    color:black;
}
nav {
    text-align:center;
    margin-bottom:20px;
}
nav a {
    margin:0 10px;
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* Galerie */
.gallery {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:15px;
    padding:20px;
}
.gallery img {
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    cursor:pointer;
    transition: transform 0.3s ease;
}
.gallery img:hover { transform: scale(1.05); }

@media(max-width:900px){.gallery{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.gallery{grid-template-columns:1fr;}}

/* Lightbox Overlay */
#lightbox-overlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:999;
}
#lightbox-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
    box-sizing:border-box;
    z-index:9999;
}

#lightbox-overlay img {
    max-height:85vh;   /* DAS ist der entscheidende Unterschied */
    max-width:90vw;
    width:auto;
    height:auto;
    object-fit:contain;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
}

/* Footer */
footer {
    text-align:center;
    padding:40px;
    font-size:14px;
}
</style>
</head>
<body>

<header><a href="/">REGINA POTOMKINA</a></header>

    <a href="/">Gallery</a> | <a href="cv.html">CV</a>

</section>

<!-- Lightbox Overlay -->
<div id="lightbox-overlay">
    <img id="lightbox-img" src="">
</div>

<script>
const overlay = document.getElementById('lightbox-overlay');
const overlayImg = document.getElementById('lightbox-img');
document.querySelectorAll('.lightbox-trigger').forEach(img => {
  img.addEventListener('click', () => {
    overlay.style.display = 'flex';
    overlayImg.src = img.src;
  });
});
overlay.addEventListener('click', () => {
  overlay.style.display = 'none';
});
</script>
